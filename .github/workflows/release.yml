name: Release

# Bumps the patch version on every push to main, then pushes the bump
# commit + tag. Publishing happens in publish.yml (npm Trusted Publishing),
# which chains off this workflow via workflow_run.
on:
  push:
    branches: [main]

jobs:
  release:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Skip commits created by the version bump itself (message is "vX.Y.Z")
    if: "!startsWith(github.event.head_commit.message, 'v')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        # Updates package.json, runs scripts/sync-version.js (patches src/cli.ts,
        # src/index.ts + .claude-plugin/plugin.json and stages them), then creates
        # a "vX.Y.Z" commit + tag. The v-prefixed message keeps the skip-guard
        # above from re-triggering on the bump commit.
        run: npm version patch -m "v%s"

      - name: Push commit and tag
        run: git push origin main --follow-tags
