name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Bump version and publish to npm
    runs-on: ubuntu-latest
    # Skip if this commit was already created by the version bump (message is "vX.Y.Z")
    if: "!startsWith(github.event.head_commit.message, 'v')"

    environment:
      name: npm
      url: https://www.npmjs.com/package/notion-agent-cli

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        # Updates package.json, runs scripts/sync-version.js (patches src/cli.ts +
        # .claude-plugin/plugin.json and stages them), then creates a git commit + tag.
        run: npm version patch

      - name: Push commit and tag
        run: git push origin main --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
