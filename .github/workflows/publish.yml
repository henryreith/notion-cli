name: Publish to npm

# Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# The npm package is configured to trust this repo + this workflow file.
# Triggers: manually pushed v* tags, or automatically after the Release
# workflow bumps the version (CI-pushed tags don't fire tag events).
on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  publish:
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/notion-agent-cli
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run fires with the pre-bump SHA; the bump commit is on main
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Skip if this version is already on the registry
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "notion-agent-cli@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "notion-agent-cli@$VERSION already published — skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (OIDC)
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
